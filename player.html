<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player — MABY</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script type="module" crossorigin src="./assets/player-BvKszD3D.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/dom-B5BxnSbj.js">
  <link rel="modulepreload" crossorigin href="./assets/session-C7qXeeNi.js">
  <link rel="modulepreload" crossorigin href="./assets/confirm-CtDPs8Ja.js">
  <link rel="stylesheet" crossorigin href="./assets/dom-BbxDJcLn.css">
</head>
<body class="has-nav">
  <div class="topbar">
    <a class="back" href="leaderboard.html" id="back">← Back</a>
    <span></span>
  </div>

  <div class="screen">
    <!-- Public profile: no Telegram ID, balance or ledger by design -->
    <div class="card prof-card">
      <div class="prof-head">
        <div class="avatar">
          <svg viewBox="0 0 110 110" aria-label="avatar">
            <g transform="rotate(45 55 55)">
              <rect x="25" y="25" width="60" height="30" rx="6" fill="#9bf6cf"/>
              <rect x="25" y="55" width="60" height="30" rx="6" fill="#14b88a"/>
            </g>
          </svg>
          <span class="lvl-badge">Lvl <span id="lvlBadge">—</span></span>
        </div>
        <div class="prof-meta">
          <h2 class="prof-name" id="name">Loading…</h2>
          <div class="prof-id" id="title">—</div>
        </div>
      </div>
    </div>

    <!-- Social actions (add / challenge / block / unblock); hidden for your own profile -->
    <div class="card" id="actionsCard" hidden>
      <div class="ref-actions" id="actions"></div>
      <div class="promo-msg" id="actMsg"></div>
    </div>

    <div class="card stats-card">
      <h3>📊 All-Time Stats</h3>
      <div class="stat-totals">
        <div class="stat-box"><span class="stat-k">Rounds</span><b id="pRounds">—</b></div>
        <div class="stat-box"><span class="stat-k">Wagered</span><b id="pWagered">—</b></div>
        <div class="stat-box"><span class="stat-k">Won</span><b id="pWon">—</b></div>
        <div class="stat-box"><span class="stat-k">Net</span><b id="pNet">—</b></div>
        <div class="stat-box"><span class="stat-k">Biggest win</span><b id="pBig">—</b></div>
        <div class="stat-box"><span class="stat-k">Streak</span><b id="pStreak">—</b></div>
        <div class="stat-box"><span class="stat-k">Favorite</span><b id="pFav">—</b></div>
      </div>
      <div class="muted" id="pMsg"></div>
    </div>
  </div>

  <!-- Game picker: choose the game + wager, then the dice page waits for acceptance -->
  <div class="ob-overlay" id="gamePickerOverlay" hidden>
    <div class="ob-modal">
      <button class="ob-skip" id="gamePickerClose" type="button">✕ Close</button>
      <h2 id="gamePickerTitle">Challenge</h2>
      <div class="muted" style="font-size:13px;">Pick a game</div>
      <div class="hist-filters" id="gamePickerGames" style="justify-content:center;"></div>
      <div class="muted" id="gamePickerWagerLabel" style="font-size:13px;" hidden>Wager per side</div>
      <div class="hist-filters" id="gamePickerWagers" style="justify-content:center;"></div>
      <button class="btn green" id="gamePickerSend" style="width:100%;" disabled>Send Challenge</button>
      <div class="promo-msg" id="gamePickerMsg"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-ico">🎮</span>Games</a>
    <a href="leaderboard.html" class="nav-item active"><span class="nav-ico">🏆</span>Top</a>
    <a href="profile.html" class="nav-item"><span class="nav-ico">👤</span>Profile</a>
  </nav>

</body>
</html>

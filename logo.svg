<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="wm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a9f0cf"/>
      <stop offset="1" stop-color="#2ea878"/>
    </linearGradient>
  </defs>
  <!-- #30 Mint two-tone mark -->
